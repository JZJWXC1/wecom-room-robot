# 企业微信「微信客服」IP:80 回调专用 server 块 —— Certbot 不托管、Certbot 免疫。
#
# 部署路径：/etc/nginx/conf.d/00-wecom-ip-callback.conf（本文件为仓库源真值副本）。
#
# 背景：企微 KF 回调 URL = http://114.55.168.97/wecom/kf/callback（IP 主机 + 端口 80）。
# /etc/nginx/conf.d/ynzy-miniapp.conf 的 `listen 80` 块由 Certbot 托管，
# 每次手工 `certbot --nginx`（扩子域名证书）重跑会把该块整体重写为
# "域名跳 https + 裸 return 404"，抹掉手工加进去的 /wecom/ 转发
# → IP:80 的 /wecom/ 落到 return 404 → 企微客服回调 404 → 机器人对客失聪
# （2026-07-04、2026-07-06 两次实证，后者约 19 小时）。
#
# 本文件是独立 conf：Certbot 只重写它按 server_name 认领的域名 server 块，
# 从不触碰本文件（本块只声明裸 IP，Certbot 不会为 IP 签证书、也不认领）。
# 且 conf.d/*.conf 按文件名排序加载，`00-` 前缀最先加载，
# 优先注册 server_name 114.55.168.97；ynzy-miniapp.conf 中同名的 IP 声明
# 因 server_name 冲突被 nginx 忽略（仅产生一条 cosmetic
# "conflicting server name" WARN，`nginx -t` 仍 test is successful）。
# 于是 Host=114.55.168.97 的 :80 请求恒由本块处理 → 彻底摆脱 Certbot 重写。
#
# 行为精确复刻迁移前 IP:80 现状：仅 /wecom/ 转发到本地应用，其余一律 404。
# 域名（ynzyqbot.cn / www.ynzyqbot.cn）仍由 ynzy-miniapp.conf 处理，
# 本块不声明任何域名、不设 default_server，不影响域名的 80→443 跳转。
server {
    listen 80;
    server_name 114.55.168.97;

    # 取证头：任何经本块出去的响应都带此头，便于一眼确认"是本块在服务"，
    # 避免再次出现"回调 404 却查不清是哪个 server 块"的排障困境。
    add_header X-Callback-Guard "ip80-standalone" always;

    # 企业微信客服回调 → 本地应用（FastAPI :8000）。
    location ^~ /wecom/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
