name: Local tests

on:
  pull_request:
  push:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install local test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Prepare isolated safe env
        run: |
          mkdir -p "$RUNNER_TEMP/wecom-room-robot-safe-env"
          cp tests/fixtures/safe_runtime.env.example "$RUNNER_TEMP/wecom-room-robot-safe-env/.env"

      - name: Compile check
        working-directory: ${{ runner.temp }}/wecom-room-robot-safe-env
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUTF8: "1"
          DASHSCOPE_API_KEY: ""
          OPENAI_API_KEY: ""
          FEISHU_APP_ID: ""
          FEISHU_APP_SECRET: ""
          WECOM_CORP_SECRET: ""
          WECOM_TOKEN: ""
          WECOM_ENCODING_AES_KEY: ""
          SSH_PASSWORD: ""
          SERVER_PASSWORD: ""
        run: |
          python -m compileall -q "$GITHUB_WORKSPACE/app" "$GITHUB_WORKSPACE/scripts" "$GITHUB_WORKSPACE/tests"

      - name: Run pytest
        working-directory: ${{ runner.temp }}/wecom-room-robot-safe-env
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUTF8: "1"
          DASHSCOPE_API_KEY: ""
          OPENAI_API_KEY: ""
          FEISHU_APP_ID: ""
          FEISHU_APP_SECRET: ""
          WECOM_CORP_SECRET: ""
          WECOM_TOKEN: ""
          WECOM_ENCODING_AES_KEY: ""
          SSH_PASSWORD: ""
          SERVER_PASSWORD: ""
        run: |
          python -m pytest -q -m "not online" "$GITHUB_WORKSPACE/tests"
